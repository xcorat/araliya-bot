name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format-and-lint:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Check formatting
        run: cargo fmt --all -- --check
        
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Workspace Tests
        run: cargo test --workspace
        
      - name: araliya-memory extended features tests
        run: cargo test -p araliya-memory --features "isqlite,idocstore,ikgdocstore"

  build-tiers:
    name: Verify Build Tiers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: minimal
            command: cargo build -p araliya-bot --no-default-features --features minimal
          - tier: default
            command: cargo build -p araliya-bot
          - tier: full
            command: cargo build -p araliya-bot --features full
          - tier: tools-all
            command: cargo build -p araliya-tools --all-features
          - tier: cron
            command: cargo build -p araliya-cron
          - tier: runtimes
            command: cargo build -p araliya-runtimes --all-features
          - tier: ui
            command: cargo build -p araliya-ui --all-features
          - tier: agents
            command: cargo build -p araliya-agents --all-features
          - tier: memory-extended
            command: cargo build -p araliya-memory --features "isqlite,idocstore,ikgdocstore"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Tier (${{ matrix.tier }})
        run: ${{ matrix.command }}
