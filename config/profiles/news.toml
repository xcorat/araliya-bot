[meta]
base = "full.toml"

[agents]
default = "news"

[agents.docs]
enabled = true
docsdir = "docs/"
index = "index.md"

[agents.news]
enabled = true

[agents.news.query]
label = "Label_6135459501644760604"
n_last = 10
t_interval = "3d"  # also supports: 1mon, 1min, 1h, 1w
# q = "is:unread"    # extra Gmail search terms appended to the built query

[comms.telegram]
enabled = true
