# Local LLM testing — routes all inference to a local Qwen instance.
# Requires a running Qwen server at http://127.0.0.1:8081.
#
# Usage:
#   cargo run -- -i --config config/profiles/llm-test.toml

[meta]
base = "../default.toml"

[supervisor]
bot_name = "araliya-test"
work_dir = "~/.araliya"
log_level = "info"

[comms.pty]
enabled = true

[agents]
default = "basic_chat"
debug_logging = true

[agents.basic_chat]
enabled = true

[llm]
default = "qwen"

[llm.instruction]
provider = "qwen"

[llm.qwen]
api_base_url = "http://127.0.0.1:8081/v1/chat/completions"
model = "qwen3.5"
# temperature = 0.2
timeout_seconds = 3600
# max_tokens = 8192
input_per_million_usd = 0.0
output_per_million_usd = 0.0
cached_input_per_million_usd = 0.0
