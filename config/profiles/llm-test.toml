# Local LLM testing — routes all inference to a local Qwen instance.
# Requires a running Qwen server at http://127.0.0.1:8081.
#
# Usage:
#   cargo run -- -i --config config/profiles/llm-test.toml

[meta]
base = "../default.toml"

[supervisor]
bot_name = "araliya-test"
work_dir = "~/.araliya"
log_level = "info"

[comms.pty]
enabled = true

[agents]
default = "basic_chat"
debug_logging = true

[agents.basic_chat]
enabled = true

[llm]
default = "local"
instruction = "local"

[llm.providers.local]
api_type = "chat_completions"
api_base_url = "http://127.0.0.1:8081/v1/chat/completions"
model = "qwen3.5"
timeout_seconds = 3600
