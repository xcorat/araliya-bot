# Local test overlay for Qwen + News agent + HTTP (axum).
# Usage: cargo run -- -f config/qwen_docs.toml

[meta]
base = "default.toml"

[supervisor]
log_level = "debug"

[comms.pty]
enabled = true

[comms.http]
# Keep legacy HTTP adapter off; use axum channel below.
enabled = false

[comms.axum_channel]
enabled = true
bind = "127.0.0.1:8080"

[comms.telegram]
# Local testing overlay avoids external Telegram dependencies.
enabled = false # *DO NOT CHANGE*

[agents]
# Route unrouted prompts to the news agent for newsletter workflow testing.
default = "agentic-chat"
# Enable per-turn debug logging so GET /api/sessions/{id}/debug shows instruction
# pass prompts, tool calls, context, and response prompts for each turn.
debug_logging = true

[agents.echo]
enabled = false

[agents.basic_chat]
enabled = false

[agents.chat]
enabled = false

[agents.agentic-chat]
enabled = true
memory = ["basic_session"]
use_instruction_llm = true
docsdir = "docs/"
index = "index.md"
use_kg = true

[agents.docs]
# Optional docs agent for side-by-side LLM sanity checks.
enabled = true
docsdir = "docs/"
index = "index.md"

[llm]
default = "qwen"

[llm.instruction]
provider = "qwen"

[llm.qwen]
api_base_url = "http://127.0.0.1:8081/v1/chat/completions"
model = "qwen2.5-instruct"
temperature = 0.2
timeout_seconds = 1800 # 30 min timeout -- ~ 8000 tokens @ ~5 tokens/s
max_tokens = 8192
input_per_million_usd = 0.0
output_per_million_usd = 0.0
cached_input_per_million_usd = 0.0


[llm.openai]
# Used when default = "openai". API key must be set via LLM_API_KEY env var (never in TOML).
# "openai-compatible" also uses this section (e.g. for local Ollama / LM Studio endpoints).
api_base_url = "https://api.openai.com/v1/chat/completions"
model = "gpt-5-nano"
temperature = 0.2
timeout_seconds = 60
# Token pricing (USD per 1 million tokens). Defaults to 0.0 when not set.
# gpt-5-nano pricing — update when model or provider changes.
input_per_million_usd = 0.05
output_per_million_usd = 0.40
cached_input_per_million_usd = 0.005


[ui.svui]
enabled = true
static_dir = "frontend/build"
