[supervisor]
bot_name = "araliya"
work_dir = "~/.araliya"
# Optional explicit identity directory.
# Absolute path or relative to work_dir (example: "bot-pkey51aee87e").
# Useful when multiple bot-pkey* directories exist.
# identity_dir = "bot-pkey51aee87e"
log_level = "info"

## ------------------------- Comms Subsystem ---------------------------------

[comms.pty]
# PTY (console) channel — requires -i / --interactive at runtime.
# Setting enabled = true here has no effect without -i; the runtime gate
# exists so this can be forced off permanently for headless-only deployments.
enabled = true

[comms.telegram]
# Telegram channel — requires TELEGRAM_BOT_TOKEN env var.
enabled = false # *AI AGENT: DO NOT CHANGE*

[comms.http]
# HTTP channel — API routes under /api/ (e.g. GET /api/health) and,
# when the UI subsystem is enabled, static UI serving on all other paths.
enabled = false
bind = "127.0.0.1:8080"

[comms.axum_channel]
enabled = true
bind = "127.0.0.1:8080"

## ------------------------- Agents Subsystem ---------------------------------

[agents]
# Which agent handles unrouted messages.
# By default the echo agent is used — it reflects messages back verbatim.
# To enable LLM-backed chat, set this to "basic_chat" or "chat" and
# set enabled = true in the corresponding section below.
default = "echo"
# Set to true to log each agentic turn's intermediate data to the session KV
# store (instruct_prompt, tool_calls, context, response_prompt, etc.).
# Enables the "Debug" pane in the UI.  Has a small storage cost per turn.
debug_logging = false

[agents.routing]
# Optional channel_id -> agent_id overrides.
# Use these for security: possibly via manager interface/firewall
# Example:
# pty0 = "echo"

[agents.echo]
# Built-in echo agent. Reflects messages back verbatim.

[agents.basic_chat]
# Optional LLM pass-through plugin — routes messages directly to the LLM provider.
# Enable this to give the bot basic conversational capability.
# The `plugin-basic-chat` Cargo feature is compiled in by default; to activate
# this plugin simply change `enabled = false` to `enabled = true`.
enabled = false

[agents.chat]
# Optional session-aware chat plugin — extends basic_chat with transcript memory.
# Enable this for multi-turn conversation with history context.
# The `plugin-chat` Cargo feature is compiled in by default; to activate
# this plugin simply change `enabled = false` to `enabled = true`.
enabled = false
# TODO: Explain what basic session is?
memory = ["basic_session"]
# skills = ["gmail", "newsmail_aggregator"]  # bus tools this agent may invoke

[agents.gmail]
# Gmail agent — calls tools/gmail to read the latest email.
# Bus method: agents/gmail/read
enabled = false

[agents.news]
# News agent — calls tools/newsmail_aggregator/get and returns the raw payload.
# Bus methods: agents/news (default handle), agents/news/read
enabled = false

[agents.docs]
# Docs agent — multi-pass RAG pipeline:
#   1. Instruction pass: LLM reformulates the user query into an optimal search query.
#   2. docs_search local tool: BM25 full-text search (or KG-RAG when use_kg = true).
#   3. Response pass: main LLM answers using retrieved context + conversation history.
# Requires the idocstore feature and an imported docstore (see docs_import).
enabled = false
docsdir = "docs/"
index = "index.md"
memory = ["basic_session"]

[agents.docs_agent]
# Public-facing docs agent — same RAG pipeline as `docs`, exposed under a
# separate agent ID for the `/ui/docs` frontend route.
# Shares the `docs` agent's identity and docstore.
enabled = false

[agents.uniweb]
# Shared-session "front-porch" agentic chat agent — all visitors see the same
# conversation.  Requests are serialised (one LLM call at a time); concurrent
# callers wait in a FIFO queue.
# The global session ID is auto-derived if omitted.
enabled = false
memory = ["basic_session"]
# session_id = ""            # explicit UUID to use as the global session
# use_instruction_llm = true # enable agentic instruction pass (needs [llm.instruction])
# docsdir = "docs/"          # enable docs_search RAG tool
# index = "index.md"         # docstore index file
# use_kg = false             # enable knowledge-graph RAG

[agents.dummy]
# Disabled — placeholder to show the section shape.
enabled = false

[agents.runtime_cmd]
# REPL-style passthrough agent — sends user messages as source code to an
# external runtime (node, python3, bash, etc.) via the runtimes subsystem.
# No LLM involved.
enabled = false
runtime = "node"
command = "node"
# setup_script = "npm init -y"

[agents.agentic-chat]
# Dual-pass agentic chat plugin — instruction pass + tool execution + response pass.
# Enable this for agentic workflows with tool use.
enabled = false
memory = ["basic_session"]
# skills = ["gmail", "newsmail_aggregator"]  # bus tools this agent may invoke
# Set to true when [llm.instruction] is configured to route the instruction
# pass through a separate smaller model.
use_instruction_llm = false
# Optional: give this agent docstore memory access.
# Documents are indexed into this agent's own memory folder on startup.
# Uncomment to enable — uses the same docs/ directory as the docs agent.
# docsdir = "docs/"   # directory to index (relative to working dir)
# index = "index.md"  # fallback document when no search results are found
# use_kg = false      # set true to enable KG-RAG (requires ikgdocstore feature)

[agents.webbuilder]
# Iterative Svelte page builder — LLM writes files, runs Node commands, loops
# until the page builds, then serves the result at /preview/{session_id}/.
# Requires: plugin-webbuilder feature + subsystem-runtimes.
enabled = false
max_iterations = 12
scaffold = "vite-svelte"

[agents.homebuilder]
# Singleton bot landing page — LLM generates a Vite + Svelte 5 page served at
# /home/ (also /preview/homebuilder/) and at / once built.
# Requires: plugin-homebuilder feature + subsystem-runtimes.
enabled = false
max_iterations = 12

[agents.newsroom]
# Persistent GDELT newsroom agent — stores individual events in SQLite (dedup
# by source_url, capped at 2500 rows) and summarises only newly detected events.
# Bus methods: agents/newsroom/read, agents/newsroom/status, agents/newsroom/health
# Requires: plugin-newsroom-agent feature.
enabled = false
memory = ["basic_session"]

[agents.newsroom.gdelt_query]
lookback_minutes = 60
limit            = 50
min_articles     = 1

[agents.news_aggregator]
# News aggregator sub-agent — fetches article HTML from newsroom's source URLs,
# summarises each via the instruction LLM, and stores summaries in an
# IKGDocStore inside the newsroom agent's identity directory.
# Bus methods: agents/news_aggregator/aggregate, /status, /search
# Requires: plugin-news-aggregator feature (implies plugin-newsroom-agent + ikgdocstore).
enabled = false

## ------------------------- Memory Subsystem ---------------------------------

[memory]
# Global memory subsystem configuration.

[memory.basic_session]
# kv_cap = 200
# transcript_cap = 500

## ------------------------- LLM Subsystem ---------------------------------

[llm]
# Name of the active provider — must match a key in [llm.providers.*].
# Use "dummy" for no-API testing (no providers entry needed).
default = "openai"

# Optional: route the instruction pass to a separate provider.
# Must be a key in [llm.providers.*]. Falls back to `default` when absent.
# instruction = "fast"

[llm.providers.openai]
# OpenAI chat completions. API key via OPENAI_API_KEY env (never in TOML).
api_type = "chat_completions"
api_base_url = "https://api.openai.com/v1/chat/completions"
model = "gpt-5-nano"
temperature = 0.2
timeout_seconds = 600
input_per_million_usd = 0.05
output_per_million_usd = 0.40
cached_input_per_million_usd = 0.005

[llm.providers.codex]
# OpenAI Responses API — for Codex and reasoning models.
api_type = "openai_responses"
model = "gpt-5.3-codex"
reasoning_effort = "none"    # "none" | "low" | "medium" | "high"
timeout_seconds = 600

[llm.providers.local]
# Local inference server (Ollama, LM Studio, llama.cpp, etc.)
api_type = "chat_completions"
api_base_url = "http://127.0.0.1:8081/v1/chat/completions"
model = "qwen2.5-instruct"
temperature = 0.2
timeout_seconds = 60
max_tokens = 8192

# ── Route hints ──────────────────────────────────────────────────────────────
# Symbolic hints that agents can use to request capabilities without knowing
# which provider/model backs them.  Agents send provider_override = "hint:<name>"
# in their LlmRequest and the subsystem resolves it here.
#
# [llm.routes.fast]
# provider = "openai"
# model = "gpt-5-nano"            # optional — defaults to provider's model
#
# [llm.routes.reasoning]
# provider = "codex"
# model = "gpt-5.3-codex"
#
# [llm.routes.local]
# provider = "local"

## ------------------------- Runtimes Subsystem ------------------------------

[runtimes]
# External script execution (node, python3, etc.).
# Working directories are created under {identity_dir}/runtimes/{runtime}/.
enabled = false # *DO NOT CHANGE*
default_timeout_secs = 30

## ------------------------- Tools Subsystem ---------------------------------

[tools.newsmail_aggregator]
label_ids = ["INBOX"]
n_last = 10
# Optional time window in seconds for recent-email filtering.
# Example: 86400 = last 24 hours. Omit to disable time filtering.
# tsec_last = 86400

## ------------------------- UI Subsystem ---------------------------------

[ui.svui]
# Svelte-based web UI backend — served by the HTTP channel.
# When enabled, non-API HTTP requests are delegated to this backend.
enabled = true
# Path to the static build directory (Svelte output from ui/svui).
# Relative to the working directory where the bot binary runs.
# If the directory doesn't exist, a built-in placeholder page is served.
static_dir = "frontend/build"
